# ============================================
# AutoOps AI — Docker Compose (Development)
# ============================================
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose logs -f        # Follow logs
#   docker-compose down           # Stop services
# ============================================

version: "3.9"

services:
  # ---- Backend (FastAPI) ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autoops-backend
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    volumes:
      - ./backend:/app
    restart: unless-stopped

